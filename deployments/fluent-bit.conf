# fluent-bit.conf — example configuration for jti_nus plugin
# Copy to /etc/fluent-bit/fluent-bit.conf and edit for your environment.

[SERVICE]
    flush           1
    daemon          Off
    log_level       info
    parsers_file    /etc/fluent-bit/parsers.conf
    plugins_file    /etc/fluent-bit/plugins.conf
    http_server     On
    http_listen     0.0.0.0
    http_port       2020
    storage.metrics on

[INPUT]
    Name          jti_nus
    Listen        0.0.0.0
    Port          4729
    Buffer_Size   65535
    Tag           jti.*
    Debug         Off

# ── Outputs ──────────────────────────────────────────────────────────────────
# InfluxDB v2
[OUTPUT]
    Name          influxdb
    Match         jti.*
    Host          <ip_address_of_influx_server>
    Port          8086
    Bucket        jti_native
    Org           <valid_influx_org>
    Sequence_Tag  _seq
    Tag_Keys      sensor_name device
    HTTP_Token    <valid_influx_token>

# Elasticsearch
#[OUTPUT]
#    Name          es
#    Match         jti.*
#    Host          <ip_address_of_elasticsearch_server>
#    Port          9200
#    Index         jti-telemetry

# Splunk HEC
#[OUTPUT]
#    Name          splunk
#    Match         jti.*
#    Host          <ip_address_of_splunk_server>
#    Port          8088
#    Splunk_Token  <valid_hec_token>

# File output (plain JSON, one record per line — pipe to jq for readability)
[OUTPUT]
    Name          file
    Match         jti.*
    Path          /var/log/jti_nus
    File          jti.log
    Format        plain

# Filter out zero-payload keepalive packets
[FILTER]
    Name          grep
    Match         jti.*
    Regex         sensor_name .+
